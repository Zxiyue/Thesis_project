seed: 123
output_dir: outputs/mnist_iid_distributed_acc
dataset:
  name: MNIST
  data_dir: data
  iid: true
  shards_per_client: 2
  max_train_samples: 1000
  max_test_samples: 500
federated:
  clients: 5
  rounds: 10
  threshold: 3
  local_epochs: 3
  batch_size: 64
  local_lr: 0.05
  server_lr: 1.0
  dropout:
    3:
    - 2
model:
  name: tiny_cnn
encoding:
  scale: 10000
  q: 1000000007
crypto:
  paillier_bits: 512
  pedersen_prime_bits: 521
  pedersen_window: 0
blockchain:
  enabled: true
  rpc_url: http://127.0.0.1:8545
  contract_json: outputs/contract.json
communication:
  enabled: true
  mode: http
  record_actual_time: true
  timeout_seconds: 7200
distributed:
  enabled: true
  client_mode: individual
  host: 127.0.0.1
  kgc_port: 9200
  cs_port: 9300
  client_base_port: 9400
logging:
  verbose: true
  save_trace: true
runtime:
  device: auto
  parallel_clients: true
  max_client_workers: 5
  num_workers: 0
  pin_memory: false
  test_batch_size: 256
